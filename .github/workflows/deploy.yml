name: Deploy site to Fly.io

# Auto-deploy the website on every push to main that touches it.
# Manual runs are also allowed from the Actions tab.
on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

# Never run two deploys at once; cancel an in-flight one if a newer push lands.
concurrency:
  group: fly-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        working-directory: website
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
